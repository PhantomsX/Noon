name: Build & Deploy Noon

on:
  push:
    branches: [main, ZEVELOOP]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: noon
  INSTANCE_ID: i-0154a88b3b75c9d23
  ROLE_ARN: arn:aws:iam::966121465951:role/github-actions-deploy-noon

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve environment from branch
        id: env
        run: |
          case "$GITHUB_REF_NAME" in
            main)     echo "tag=prod-latest" >>"$GITHUB_OUTPUT"; echo "dir=noon"     >>"$GITHUB_OUTPUT" ;;
            ZEVELOOP) echo "tag=dev-latest"  >>"$GITHUB_OUTPUT"; echo "dir=noon-dev" >>"$GITHUB_OUTPUT" ;;
            *) echo "Branch $GITHUB_REF_NAME is not mapped to an environment"; exit 1 ;;
          esac

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          TAG: ${{ steps.env.outputs.tag }}
        run: |
          IMAGE="$REGISTRY/$ECR_REPOSITORY"
          docker build -t "$IMAGE:$TAG" -t "$IMAGE:${GITHUB_SHA::7}" .
          docker push "$IMAGE:$TAG"
          docker push "$IMAGE:${GITHUB_SHA::7}"

      - name: Deploy on EC2 via SSM
        env:
          DIR: ${{ steps.env.outputs.dir }}
          TAG: ${{ steps.env.outputs.tag }}
        run: |
          PARAMS=$(jq -n --arg cmd "runuser -l ec2-user -c \"/home/ec2-user/deploy-app.sh $DIR\"" '{commands:[$cmd]}')
          CMD_ID=$(aws ssm send-command --region "$AWS_REGION" --instance-ids "$INSTANCE_ID" \
            --document-name AWS-RunShellScript --comment "deploy $ECR_REPOSITORY:$TAG -> $DIR" \
            --parameters "$PARAMS" --query Command.CommandId --output text)
          echo "SSM command: $CMD_ID"
          aws ssm wait command-executed --region "$AWS_REGION" --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" || true
          STATUS=$(aws ssm get-command-invocation --region "$AWS_REGION" --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query Status --output text)
          echo "::group::deploy output"
          aws ssm get-command-invocation --region "$AWS_REGION" --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query StandardOutputContent --output text
          aws ssm get-command-invocation --region "$AWS_REGION" --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query StandardErrorContent --output text
          echo "::endgroup::"
          echo "Deploy status: $STATUS"
          test "$STATUS" = "Success"
